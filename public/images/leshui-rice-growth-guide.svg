      <ellipse cx="169" cy="121" rx="9" ry="16"/><ellipse cx="180" cy="104" rx="9" ry="16"/><ellipse cx="197" cy="91" rx="9" ry="16"/>
    </g>
    <text x="130" y="54" text-anchor="middle" fill="#244f35" font-size="28" font-family="sans-serif" font-weight="700">抽穗期</text>
    <text x="130" y="454" text-anchor="middle" fill="#fff7dd" font-size="18" font-family="sans-serif">稻穗出現、仍偏綠</text>
  </g>
