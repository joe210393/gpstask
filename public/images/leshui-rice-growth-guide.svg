  <rect x="40" y="663" width="1118" height="38" rx="19" fill="#f4ebc6"/>
  <text x="599" y="689" text-anchor="middle" fill="#4b633e" font-size="19" font-family="sans-serif">提示：稻穗轉為金黃色，且因穀粒重量而低垂，通常代表已進入成熟期。</text>
