    <g fill="#e5b63b">
      <ellipse cx="116" cy="190" rx="10" ry="17"/><ellipse cx="132" cy="204" rx="10" ry="17"/><ellipse cx="144" cy="222" rx="10" ry="17"/><ellipse cx="154" cy="243" rx="10" ry="17"/>
      <ellipse cx="160" cy="174" rx="10" ry="17"/><ellipse cx="178" cy="192" rx="10" ry="17"/><ellipse cx="190" cy="217" rx="10" ry="17"/><ellipse cx="197" cy="239" rx="10" ry="17"/>
