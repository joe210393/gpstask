<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">稻米生長階段觀察圖</title>
  <desc id="desc">幼苗期、生長期、抽穗期與成熟期的比較教學圖</desc>
  <rect width="1200" height="720" fill="#fffdf1"/>
  <rect width="1200" height="116" fill="#244f35"/>
  <text x="60" y="58" fill="#fffbe5" font-size="39" font-family="sans-serif" font-weight="700">稻穗成熟判斷員</text>
  <text x="60" y="91" fill="#dceab9" font-size="18" font-family="sans-serif">觀察顏色、穀粒飽滿度與稻穗姿態，找出現場稻子的階段</text>
  <g transform="translate(40 150)">
    <rect width="260" height="490" rx="22" fill="#eef6dd" stroke="#c3d894" stroke-width="3"/>
    <rect y="396" width="260" height="94" rx="0" fill="#896a3c"/>
    <path d="M132 398V289M132 331L84 277M132 354L182 295" fill="none" stroke="#6eae44" stroke-width="13" stroke-linecap="round"/>
    <path d="M84 277q34 1 48 42M182 295q-37 2-50 40" fill="#76c94b"/>
    <text x="130" y="54" text-anchor="middle" fill="#244f35" font-size="28" font-family="sans-serif" font-weight="700">幼苗期</text>
    <text x="130" y="454" text-anchor="middle" fill="#fff7dd" font-size="18" font-family="sans-serif">嫩綠、株型矮小</text>
  </g>
  <g transform="translate(326 150)">
    <rect width="260" height="490" rx="22" fill="#eef6dd" stroke="#c3d894" stroke-width="3"/>
