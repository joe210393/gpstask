    <text x="130" y="454" text-anchor="middle" fill="#fff7dd" font-size="18" font-family="sans-serif">葉片旺盛、尚無稻穗</text>
  </g>
  <g transform="translate(612 150)">
    <rect width="260" height="490" rx="22" fill="#f3f6d9" stroke="#d6d28e" stroke-width="3"/>
    <rect y="396" width="260" height="94" fill="#896a3c"/>
